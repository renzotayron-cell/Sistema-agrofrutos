<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSOMA | Login Seguro</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --primary:#163d2a;
  --primary-light:#1f5a3c;
  --secondary:#2d6a4f;
  --text:#1e293b;
  --gray:#64748b;
  --border:#dbe4ea;
}

body{
  font-family:'Segoe UI',sans-serif;

  background:
  linear-gradient(
    135deg,
    #edf7f1,
    #eef4ff
  );

  min-height:100vh;

  display:flex;
  flex-direction:column;
}

/* ===================================
   HEADER
=================================== */

header{
  background:var(--primary);

  color:white;

  padding:16px 30px;

  display:flex;
  align-items:center;
  gap:14px;

  box-shadow:
  0 2px 12px rgba(0,0,0,.08);
}

.logo{
  width:50px;
  height:50px;

  border-radius:14px;

  background:
  rgba(255,255,255,.12);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:24px;
}

header h1{
  font-size:17px;
  font-weight:600;
}

header p{
  font-size:12px;
  opacity:.8;
}

/* ===================================
   MAIN
=================================== */

.main{
  flex:1;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:40px 20px;
}

.login-card{
  width:100%;
  max-width:440px;

  background:white;

  border-radius:24px;

  padding:42px 35px;

  border:1px solid #e8eef3;

  box-shadow:
  0 15px 40px rgba(0,0,0,.08);

  animation:fade .4s ease;
}

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(15px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

.login-icon{
  width:82px;
  height:82px;

  background:#dcfce7;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  margin:auto;

  font-size:36px;

  margin-bottom:20px;
}

.login-card h2{
  text-align:center;

  color:var(--primary);

  font-size:25px;

  margin-bottom:8px;
}

.sub{
  text-align:center;

  color:var(--gray);

  font-size:13px;

  margin-bottom:26px;
}

.badge{
  display:block;

  width:max-content;

  margin:auto;

  background:#dcfce7;

  color:var(--primary);

  padding:8px 18px;

  border-radius:40px;

  font-size:11px;

  font-weight:700;

  letter-spacing:.08em;

  margin-bottom:32px;
}

/* ===================================
   ERROR
=================================== */

.error{
  display:none;

  background:#fef2f2;

  border:1px solid #fecaca;

  color:#b91c1c;

  padding:12px;

  border-radius:10px;

  font-size:13px;

  text-align:center;

  margin-bottom:18px;
}

.shake{
  animation:shake .25s;
}

@keyframes shake{

  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}

}

/* ===================================
   FORM
=================================== */

.field{
  margin-bottom:18px;
}

.field label{
  display:block;

  margin-bottom:7px;

  font-size:13px;

  font-weight:600;

  color:#334155;
}

.input-wrap{
  position:relative;
}

.field input{
  width:100%;

  padding:13px 14px;

  border-radius:10px;

  border:1.5px solid var(--border);

  outline:none;

  font-size:14px;

  transition:.2s;
}

.field input:focus{

  border-color:var(--secondary);

  box-shadow:
  0 0 0 4px rgba(45,106,79,.08);

}

.toggle-password{
  position:absolute;

  right:12px;
  top:50%;

  transform:translateY(-50%);

  cursor:pointer;

  font-size:18px;

  user-select:none;
}

/* ===================================
   BUTTON
=================================== */

.btn{
  width:100%;

  border:none;

  background:var(--primary);

  color:white;

  padding:14px;

  border-radius:12px;

  font-size:15px;

  font-weight:600;

  cursor:pointer;

  transition:.2s;

  margin-top:5px;
}

.btn:hover{
  background:var(--primary-light);
}

.btn:disabled{
  opacity:.7;
  cursor:not-allowed;
}

/* ===================================
   USERS
=================================== */

.users{
  margin-top:28px;

  border-top:1px solid #edf2f7;

  padding-top:24px;
}

.users p{
  text-align:center;

  color:#94a3b8;

  font-size:12px;

  margin-bottom:14px;
}

.user-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.user{
  display:flex;
  align-items:center;
  gap:12px;

  padding:11px 13px;

  border-radius:14px;

  background:#f8fafc;

  border:1px solid #e2e8f0;

  cursor:pointer;

  transition:.2s;
}

.user:hover{

  background:#f1f5f9;

  transform:translateY(-2px);

}

.avatar{
  width:40px;
  height:40px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;

  font-size:13px;
  font-weight:bold;
}

.name{
  font-size:13px;
  font-weight:600;
  color:#1e293b;
}

.role{
  font-size:11px;
  color:#64748b;
}

/* ===================================
   FOOTER
=================================== */

footer{
  background:var(--primary);

  color:rgba(255,255,255,.7);

  text-align:center;

  padding:14px;

  font-size:12px;
}

</style>
</head>
<body>

<!-- ===================================
     HEADER
=================================== -->

<header>

  <div class="logo">🛡️</div>

  <div>
    <h1>Sistema SSOMA</h1>
    <p>Agrofrutos Trading S.A.</p>
  </div>

</header>

<!-- ===================================
     MAIN
=================================== -->

<div class="main">

<div class="login-card">

  <div class="login-icon">
    🌿
  </div>

  <h2>Acceso Administrativo</h2>

  <p class="sub">
    Solo personal autorizado
  </p>

  <span class="badge">
    SEGURIDAD Y SALUD OCUPACIONAL
  </span>

  <!-- ERROR -->

  <div class="error" id="error">
    Usuario o contraseña incorrectos
  </div>

  <!-- USUARIO -->

  <div class="field">

    <label>Usuario</label>

    <input
      type="text"
      id="usuario"
      placeholder="Ingresa tu usuario"
    >

  </div>

  <!-- PASSWORD -->

  <div class="field">

    <label>Contraseña</label>

    <div class="input-wrap">

      <input
        type="password"
        id="password"
        placeholder="Ingresa tu contraseña"
      >

      <span
        class="toggle-password"
        id="togglePassword"
      >
        👁️
      </span>

    </div>

  </div>

  <!-- BOTON -->

  <button class="btn" id="btnLogin">
    Ingresar al Sistema
  </button>

  <!-- USUARIOS -->

  <div class="users">

    <p>Acceso rápido</p>

    <div class="user-list">

      <!-- JEFE SSOMA -->

      <div
      class="user"
      data-user="SERGIO_BRAVO"
      data-pass="Sergio2025">

        <div
        class="avatar"
        style="background:#163d2a;">
          SB
        </div>

        <div>
          <div class="name">
            JEFE DE SSOMA
          </div>

          <div class="role">
            SERGIO BRAVO
          </div>
        </div>

      </div>

      <!-- SUPERVISORA -->

      <div
      class="user"
      data-user="SARAI_RIVERA"
      data-pass="Sarai2025">

        <div
        class="avatar"
        style="background:#2d6a4f;">
          SR
        </div>

        <div>
          <div class="name">
            SUPERVISORA DE SSOMA
          </div>

          <div class="role">
            SARAI RIVERA
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

</div>

<!-- ===================================
     FOOTER
=================================== -->

<footer>
Sistema de Gestión de Incidencias © 2025
</footer>

<!-- ===================================
     SCRIPT
=================================== -->

<script>

/* ===================================
   USUARIOS
=================================== */

const usuarios = [

  {
    usuario:'SERGIO_BRAVO',
    password:'Sergio2025',
    nombre:'JEFE DE SSOMA',
    rol:'Administrador Principal'
  },

  {
    usuario:'SARAI_RIVERA',
    password:'Sarai2025',
    nombre:'SUPERVISORA DE SSOMA',
    rol:'Supervisora General'
  }

];

/* ===================================
   ELEMENTOS
=================================== */

const usuarioInput =
document.getElementById('usuario');

const passwordInput =
document.getElementById('password');

const btnLogin =
document.getElementById('btnLogin');

const errorBox =
document.getElementById('error');

const togglePassword =
document.getElementById('togglePassword');

/* ===================================
   MOSTRAR PASSWORD
=================================== */

togglePassword.addEventListener(
'click',()=>{

  const type =
  passwordInput.type === 'password'
  ? 'text'
  : 'password';

  passwordInput.type = type;

  togglePassword.textContent =
  type === 'password'
  ? '👁️'
  : '🙈';

});

/* ===================================
   LOGIN
=================================== */

function login(){

  const usuario =
  usuarioInput.value.trim();

  const password =
  passwordInput.value.trim();

  /* VALIDAR CAMPOS */

  if(usuario === '' || password === ''){

    mostrarError(
      'Completa todos los campos'
    );

    return;
  }

  /* LOADING */

  btnLogin.disabled = true;

  btnLogin.textContent =
  'Verificando...';

  /* SIMULACION LOGIN */

  setTimeout(()=>{

    const encontrado =
    usuarios.find(u =>

      u.usuario === usuario &&
      u.password === password

    );

    if(encontrado){

      /* GUARDAR SESION */

      sessionStorage.setItem(

        'ssoma_user',

        JSON.stringify({

          usuario:
          encontrado.usuario,

          nombre:
          encontrado.nombre,

          rol:
          encontrado.rol

        })

      );

      /* REDIRECCION */

      window.location.href =
      'dashboard.html';

    }else{

      mostrarError(
        'Credenciales incorrectas'
      );

      passwordInput.value = '';

      passwordInput.focus();

    }

    btnLogin.disabled = false;

    btnLogin.textContent =
    'Ingresar al Sistema';

  },1000);

}

/* ===================================
   ERROR
=================================== */

function mostrarError(msg){

  errorBox.style.display =
  'block';

  errorBox.textContent = msg;

  errorBox.classList.remove(
    'shake'
  );

  void errorBox.offsetWidth;

  errorBox.classList.add(
    'shake'
  );

}

/* ===================================
   ENTER
=================================== */

document.querySelector('.login-card')
.addEventListener('keydown',e=>{

  if(e.key === 'Enter'){

    login();

  }

});

/* ===================================
   BOTON LOGIN
=================================== */

btnLogin.addEventListener(
  'click',
  login
);

/* ===================================
   AUTOCOMPLETAR
=================================== */

document.querySelectorAll('.user')
.forEach(user=>{

  user.addEventListener('click',()=>{

    usuarioInput.value =
    user.dataset.user;

    passwordInput.value =
    user.dataset.pass;

    usuarioInput.focus();

  });

});

/* ===================================
   VERIFICAR SESION
=================================== */

if(sessionStorage.getItem(
  'ssoma_user'
)){

  window.location.href =
  'dashboard.html';

}

</script>

</body>
</html>
